name: Deploy

on:
  push:
    branches:
      - main

env:
  GCP_REGION: europe-west1
  SERVER_SERVICE: virtual-tryon-server
  CLIENT_SERVICE: virtual-tryon-client

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy server to Cloud Run
        working-directory: server
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CICD_SA: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          RUNTIME_SA: virtual-tryon-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          gcloud run deploy "${SERVER_SERVICE}" \
            --source . \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --quiet \
            --service-account "${RUNTIME_SA}" \
            --build-service-account "projects/${PROJECT_ID}/serviceAccounts/${CICD_SA}" \
            --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${GCP_REGION},MODEL_NAME=virtual-try-on-001"

  deploy-client:
    runs-on: ubuntu-latest
    needs: deploy-server
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Resolve server URL
        id: server
        run: |
          SERVER_URL="$(gcloud run services describe "${SERVER_SERVICE}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          echo "url=${SERVER_URL}" >> "${GITHUB_OUTPUT}"

      - name: Deploy client to Cloud Run
        working-directory: client
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CICD_SA: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          RUNTIME_SA: virtual-tryon-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
        run: |
          gcloud run deploy "${CLIENT_SERVICE}" \
            --source . \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --quiet \
            --service-account "${RUNTIME_SA}" \
            --build-service-account "projects/${PROJECT_ID}/serviceAccounts/${CICD_SA}" \
            --set-build-env-vars="VITE_API_URL=${{ steps.server.outputs.url }}"

      - name: Update server CORS origin
        run: |
          CLIENT_URL="$(gcloud run services describe "${CLIENT_SERVICE}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"
          gcloud run services update "${SERVER_SERVICE}" \
            --region "${GCP_REGION}" \
            --update-env-vars="ALLOWED_ORIGIN=${CLIENT_URL}"
